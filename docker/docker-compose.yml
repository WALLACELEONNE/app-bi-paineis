name: app-bi-paineis

services:
  postgres:
    image: postgres:16-alpine
    container_name: bi_postgres
    environment:
      POSTGRES_USER: bi_admin
      POSTGRES_PASSWORD: bi_secret_dev
      POSTGRES_DB: bi_agro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bi_admin -d bi_agro"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bi_network

  redis:
    image: redis:7-alpine
    container_name: bi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bi_network

  minio:
    image: minio/minio:latest
    container_name: bi_minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - bi_network

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bi_api
    environment:
      DATABASE_URL: postgresql+asyncpg://bi_admin:bi_secret_dev@postgres:5432/bi_agro
      DATABASE_URL_SYNC: postgresql+psycopg2://bi_admin:bi_secret_dev@postgres:5432/bi_agro
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_secret_dev
      MINIO_BUCKET: bi-uploads
      MINIO_SECURE: "false"
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - bi_network

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.worker
    container_name: bi_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://bi_admin:bi_secret_dev@postgres:5432/bi_agro
      DATABASE_URL_SYNC: postgresql+psycopg2://bi_admin:bi_secret_dev@postgres:5432/bi_agro
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_secret_dev
      MINIO_BUCKET: bi-uploads
      MINIO_SECURE: "false"
      SECRET_KEY: dev-secret-key-change-in-production
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    volumes:
      - ../backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default,importacao,exportacao
    networks:
      - bi_network

  flower:
    image: mher/flower:latest
    container_name: bi_flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: "5555"
      FLOWER_BASIC_AUTH: "admin:flower_dev"
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bi_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: bi_frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    networks:
      - bi_network

  nginx:
    image: nginx:alpine
    container_name: bi_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - bi_network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  frontend_node_modules:

networks:
  bi_network:
    driver: bridge
